<!-- Modelviewer-Komponente importieren -->
<script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.2.0/model-viewer.min.js"></script>

<!-- AR-Button sichtbarer machen -->
<style>
    model-viewer::part(default-ar-button) {
        position: absolute;
        bottom: 120px;
        left: 50%;
        transform: translateX(-50%) scale(6);
        transform-origin: center;
    }
</style>

<!-- Modelviewer-Komponente wie jedes andere HTML-Element verwenden -->
<body>
    <model-viewer
        id = "ar-viewer"
        alt="Mein 3D Modell"
        ar
        ar-modes="webxr scene-viewer quick-look"
        camera-controls
        _scale="0.01 0.01 0.01" 
        touch-actions="pan-y"
        style="width: 100vw; height: 80vh; margin: 0; display: block;">
    </model-viewer>
    <!--sceneviewer und quicklook nur als backup-->
    
<!-- Skalierung nicht mehr nötig, da wir uns mit der KI-Gruppe auf einer festen Größe geeinigt haben
    <script>
        const viewer = document.getElementById('viewer');
        viewer.addEventListener('load', () => {
            viewer.scale = "0.01 0.01 0.01";
            viewer.updateFraming();
        });
    </script> -->

    <script>
        // Das "?" abschneiden und den Modell-url aus der Addresszeile (alles, was nach dem "?" steht)
        const modelUrl = window.location.search.substring(1);

        //Das Model-Viewer Element über die ID holen
        const viewer = document.getElementById('ar-viewer');

        //Prüfen, ob eine valide Modell-url übergeben wurde
        if (modelUrl && modelUrl.trim() !== "") {
            viewer.setAttribute('src', modelUrl);
        } else {
            //Backup-Modell laden, falls keine URL angegeben wurde (zu Testzwecken)
            viewer.setAttribute('src', 'Girl.glb');
        }
    </script>
</body>
